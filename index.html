<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرر الصوت الاحترافي</title>
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 800px; margin: auto; border: 1px solid #333; }
        #waveform { background: #000; margin: 20px 0; border-radius: 10px; height: 128px; }
        .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #444; color: white; }
        button:hover { background: #666; }
        .rec-active { background: #ff4757 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .slider-group { margin: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .ai-btn { background: #8e44ad; }
    </style>
</head>
<body>

<div class="box">
    <h2>🎙️ معالج الصوت الذكي (نسخة مستقرة)</h2>
    <p style="font-size: 13px; color: #888;">قم برفع ملف أو سجل صوتك مباشرة</p>

    <input type="file" id="loader" accept="audio/*">
    <div id="waveform"></div>

    <div class="btns">
        <button id="btnRec">🎤 بدء التسجيل</button>
        <button id="btnStop" disabled>⏹️ إيقاف</button>
        <button id="btnPlay" disabled>▶️ تشغيل/إيقاف</button>
        <button id="btnDelete" disabled>🗑️ حذف</button>
    </div>

    <div class="slider-group">
        <label>صدى الصوت (Echo):</label>
        <input type="range" id="echoVol" min="0" max="0.7" step="0.1" value="0">
        
        <label>تضخيم (Volume):</label>
        <input type="range" id="gainVol" min="0" max="2" step="0.1" value="1">
    </div>

    <div class="btns">
        <button id="btnAI" class="ai-btn" disabled>✨ تحسين بالذكاء الاصطناعي</button>
        <button id="btnDownload" disabled>💾 حفظ النتيجة</button>
    </div>
</div>

<script>
    let ws, mediaRecorder, chunks = [], audioBlob, audioUrl;
    let audioContext, mainGain, delayNode, feedback;

    // 1. تهيئة مشغل الموجات
    ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#3498db',
        progressColor: '#f1c40f',
        backend: 'WebAudio',
        responsive: true,
        barWidth: 2
    });

    // 2. إعداد عقد الصوت (التأثيرات)
    function setupEffects() {
        if (!audioContext) {
            audioContext = ws.backend.getAudioContext();
            mainGain = audioContext.createGain();
            
            // نظام الصدى
            delayNode = audioContext.createDelay();
            delayNode.delayTime.value = 0.3;
            feedback = audioContext.createGain();
            feedback.gain.value = 0; // يبدأ بصفر (بدون صدى)

            delayNode.connect(feedback);
            feedback.connect(delayNode);
            
            ws.backend.setFilters([mainGain, delayNode]);
        }
    }

    // 3. التسجيل
    document.getElementById('btnRec').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(chunks, { type: 'audio/wav' });
                audioUrl = URL.createObjectURL(audioBlob);
                ws.load(audioUrl);
                enableUI();
            };

            mediaRecorder.start();
            document.getElementById('btnRec').classList.add('rec-active');
            document.getElementById('btnRec').disabled = true;
            document.getElementById('btnStop').disabled = false;
        } catch (err) {
            alert("خطأ: يرجى تفعيل الميكروفون");
        }
    };

    document.getElementById('btnStop').onclick = () => {
        mediaRecorder.stop();
        document.getElementById('btnRec').classList.remove('rec-active');
        document.getElementById('btnRec').disabled = false;
        document.getElementById('btnStop').disabled = true;
    };

    // 4. رفع ملف
    document.getElementById('loader').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            audioUrl = URL.createObjectURL(file);
            ws.load(audioUrl);
            enableUI();
        }
    };

    // 5. التحكم في التأثيرات
    document.getElementById('echoVol').oninput = (e) => {
        setupEffects();
        feedback.gain.value = parseFloat(e.target.value);
    };

    document.getElementById('gainVol').oninput = (e) => {
        setupEffects();
        mainGain.gain.value = parseFloat(e.target.value);
    };

    // 6. التحسين (AI Enhancement Simulation)
    document.getElementById('btnAI').onclick = () => {
        setupEffects();
        // فلتر "الذكاء الاصطناعي": يقوم بتنظيف الترددات المنخفضة (الضجيج) 
        // وتضخيم الترددات العالية (وضوح الكلام)
        const filter = audioContext.createBiquadFilter();
        filter.type = "peaking";
        filter.frequency.value = 2500;
        filter.Q.value = 1;
        filter.gain.value = 15; 
        
        ws.backend.setFilters([mainGain, delayNode, filter]);
        alert("تم تحسين جودة الصوت وإزالة الضجيج المحيط");
    };

    // 7. الوظائف العامة
    document.getElementById('btnPlay').onclick = () => {
        setupEffects();
        ws.playPause();
    };

    document.getElementById('btnDelete').onclick = () => {
        if(confirm("هل تريد الحذف؟")) {
            ws.empty();
            location.reload(); // لإعادة ضبط كل شيء
        }
    };

    document.getElementById('btnDownload').onclick = () => {
        const link = document.createElement('a');
        link.href = audioUrl;
        link.download = "recorded_audio.wav";
        link.click();
    };

    function enableUI() {
        document.querySelectorAll('button').forEach(b => b.disabled = false);
        document.getElementById('btnStop').disabled = true;
    }
</script>
</body>
</html>
