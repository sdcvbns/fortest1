<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مراقبة سَرمد الاحترافي - الإصدار الذكي</title>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .panel { background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 600px; text-align: center; border: 1px solid #334155; }
        .video-wrapper { position: relative; border-radius: 15px; overflow: hidden; border: 4px solid #334155; background: #000; margin-bottom: 20px; }
        video { width: 100%; height: auto; display: block; }
        .alarm-indicator { position: absolute; top: 15px; right: 15px; padding: 8px 15px; border-radius: 8px; background: #ef4444; color: white; font-weight: bold; display: none; z-index: 10; animation: blink 0.5s infinite; }
        .status-box { padding: 15px; border-radius: 12px; background: #0f172a; border: 1px solid #1e293b; margin-top: 10px; }
        .mode-tag { font-size: 0.8rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.3} 100% {opacity: 1} }
    </style>
</head>
<body>

<div class="panel">
    <div class="mode-tag">Security System v4.0</div>
    <h2>رادار الحماية الذكي 🛡️</h2>
    
    <div class="video-wrapper">
        <div id="alarmLabel" class="alarm-indicator">🚨 إنذار نشط</div>
        <video id="video" autoplay playsinline></video>
    </div>

    <button id="startBtn">تفعيل وضع الحماية</button>
    
    <div class="status-box">
        <div id="statusText">النظام: غير متصل</div>
        <div id="timerDisplay" style="color: #94a3b8; font-size: 0.9rem; margin-top: 5px;"></div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const statusText = document.getElementById('statusText');
    const alarmLabel = document.getElementById('alarmLabel');
    const timerDisplay = document.getElementById('timerDisplay');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    let prevFrame = null;
    let isActive = false;
    let alarmEndTime = 0; // وقت انتهاء الـ 10 ثواني
    let isMotionPresent = false;
    let audioContext = null;
    let oscillator = null;

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            isActive = true;
            statusText.innerText = "النظام: في حالة رصد...";
            statusText.style.color = "#4ade80";
            document.getElementById('startBtn').style.display = "none";
            
            // تهيئة الصوت
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            requestAnimationFrame(detect);
        } catch (e) { alert("يرجى السماح بالوصول للكاميرا"); }
    };

    function detect() {
        if (!isActive) return;

        // دقة منخفضة جداً لتقليل الحساسية وتجاهل الاهتزاز
        canvas.width = 60;
        canvas.height = 45;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        if (prevFrame) {
            let diffCount = 0;
            const sensitivity = 60; // رفع العتبة لتقليل الحساسية (0-255)

            for (let i = 0; i < currentFrame.length; i += 4) {
                const brightness = (currentFrame[i] + currentFrame[i+1] + currentFrame[i+2]) / 3;
                const prevBrightness = (prevFrame[i] + prevFrame[i+1] + prevFrame[i+2]) / 3;
                
                if (Math.abs(brightness - prevBrightness) > sensitivity) {
                    diffCount++;
                }
            }

            // لكي نعتبرها حركة حقيقية، يجب أن يتغير أكثر من 10% من الصورة
            isMotionPresent = diffCount > (canvas.width * canvas.height * 0.10);

            if (isMotionPresent) {
                // حركة مستمرة: نقوم بتمديد وقت الإنذار باستمرار
                alarmEndTime = Date.now() + 10000; // 10 ثواني من الآن
                startSiren();
                statusText.innerText = "🚨 رصد حركة مستمرة!";
            } else {
                // لا توجد حركة حالياً، نتحقق هل ما زلنا ضمن الـ 10 ثواني؟
                const timeLeft = Math.ceil((alarmEndTime - Date.now()) / 1000);
                if (timeLeft > 0) {
                    startSiren();
                    statusText.innerText = `⚠️ حركة مارة - الإنذار مؤقت: ${timeLeft} ثانية`;
                } else {
                    stopSiren();
                    statusText.innerText = "النظام: في حالة رصد...";
                }
            }
        }

        prevFrame = currentFrame;
        // معالجة بمعدل 10 مرات في الثانية لضمان الاستقرار
        setTimeout(() => requestAnimationFrame(detect), 100);
    }

    function startSiren() {
        alarmLabel.style.display = "block";
        if (!oscillator) {
            oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            // تأثير صفارة متناوب
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
        }
    }

    function stopSiren() {
        alarmLabel.style.display = "none";
        if (oscillator) {
            oscillator.stop();
            oscillator = null;
        }
    }
</script>
</body>
</html>
