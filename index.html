<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مراقبة سَرمد الذكي 🔒</title>
    <style>
        /* CSS - التصميم */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        h1 { color: #38bdf8; margin-bottom: 1rem; }

        .video-box {
            position: relative;
            border: 4px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            line-height: 0;
        }

        video {
            width: 100%;
            max-width: 640px;
            transform: scaleX(-1); /* مرآة لجعل الحركة طبيعية */
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #0369a1; }
        button:disabled { background: #64748b; cursor: not-allowed; }

        #status {
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            min-width: 200px;
        }

        .alert {
            background: #ef4444;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>نظام الإنذار الذكي 🛡️</h1>
    
    <div class="video-box" id="videoBox">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="startBtn">تشغيل كاميرا المراقبة</button>
        <div id="status">الحالة: النظام متوقف</div>
        <p style="font-size: 0.8rem; color: #94a3b8;">ملاحظة: سيصدر صوت إنذار عند رصد حركة كبيرة.</p>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    /* JavaScript - البرمجة */
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');
    const videoBox = document.getElementById('videoBox');

    let lastFrameData = null;
    let isMonitoring = false;

    // 1. تشغيل الكاميرا
    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            isMonitoring = true;
            startBtn.disabled = true;
            statusDiv.innerText = "🔍 المراقبة نشطة الآن...";
            statusDiv.style.color = "#4ade80";
            
            // البدء في تحليل الإطارات
            requestAnimationFrame(analyzeFrame);
        } catch (err) {
            alert("خطأ: يرجى السماح بالوصول للكاميرا.");
        }
    };

    // 2. تحليل الحركة
    function analyzeFrame() {
        if (!isMonitoring) return;

        // ضبط حجم الكانفاس ليتناسب مع الفيديو
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        // رسم الصورة الحالية
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);

        if (lastFrameData) {
            let diffPixels = 0;
            const threshold = 40; // حساسية اللون
            
            // مقارنة البكسلات (نقارن كل 4 بكسلات لتسريع الأداء)
            for (let i = 0; i < currentFrame.data.length; i += 16) {
                const rDiff = Math.abs(currentFrame.data[i] - lastFrameData.data[i]);
                const gDiff = Math.abs(currentFrame.data[i+1] - lastFrameData.data[i+1]);
                const bDiff = Math.abs(currentFrame.data[i+2] - lastFrameData.data[i+2]);

                if (rDiff + gDiff + bDiff > threshold) {
                    diffPixels++;
                }
            }

            // إذا تغير أكثر من 500 منطقة بكسل، نعتبرها حركة
            if (diffPixels > 500) {
                triggerAlarm();
            } else {
                resetAlarmVisuals();
            }
        }

        lastFrameData = currentFrame;
        requestAnimationFrame(analyzeFrame);
    }

    // 3. إطلاق الإنذار
    function triggerAlarm() {
        statusDiv.innerText = "⚠️ تحذير: تم رصد حركة!";
        statusDiv.classList.add('alert');
        videoBox.style.borderColor = "#ef4444";
        playBeep();
    }

    function resetAlarmVisuals() {
        if (statusDiv.classList.contains('alert')) {
            statusDiv.classList.remove('alert');
            statusDiv.innerText = "🔍 المراقبة نشطة الآن...";
            videoBox.style.borderColor = "#334155";
        }
    }

    // 4. توليد صوت إنذار برمجي
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }
</script>

</body>
</html>
