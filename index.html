<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرر الصوت الاحترافي - نسخة مستقرة</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00d2ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; border: 1px solid #333; }
        .status-light { width: 12px; height: 12px; background: grey; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .recording { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; background: #333; color: white; }
        button:active { transform: scale(0.95); }
        .btn-rec { background: #ff4757; }
        .btn-play { background: #2ecc71; }
        .effects { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; }
        .slider-box { margin-bottom: 15px; text-align: right; }
        input[type="range"] { width: 100%; cursor: pointer; }
        audio { width: 100%; margin-top: 20px; filter: invert(1); }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🎙️ مسجل ومعالج الصوت</h2>
    <div id="light" class="status-light"></div>
    <span id="statusText">جاهز للبدء</span>

    <div class="controls">
        <button id="startBtn" class="btn-rec">🔴 بدء التسجيل</button>
        <button id="stopBtn" disabled>⏹️ إيقاف</button>
        <button id="playBtn" class="btn-play" disabled>▶️ تشغيل المعدل</button>
        <button id="deleteBtn" style="background: #555;">🗑️ مسح الكل</button>
    </div>

    <div class="effects">
        <div class="slider-box">
            <label>تأثير الصدى (Echo): <span id="echoVal">0</span></label>
            <input type="range" id="echoSlider" min="0" max="0.8" step="0.1" value="0">
        </div>
        <div class="slider-box">
            <label>تحسين الوضوح (AI Enhance):</label>
            <button id="enhanceBtn" style="width: 100%; background: #9b59b6;">✨ تطبيق التحسين الذكي</button>
        </div>
    </div>

    <audio id="audioPlayback" controls></audio>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let audioContext;
    let audioBuffer;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const playBtn = document.getElementById('playBtn');
    const light = document.getElementById('light');
    const statusText = document.getElementById('statusText');
    const audioPlayback = document.getElementById('audioPlayback');

    // 1. وظيفة التسجيل
    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
            
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                audioPlayback.src = audioUrl;
                playBtn.disabled = false;
                statusText.innerText = "تم حفظ التسجيل!";
            };

            mediaRecorder.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            light.classList.add('recording');
            statusText.innerText = "جاري التسجيل الآن...";
        } catch (err) {
            alert("لا يمكن الوصول للميكروفون. تأكد من إعطاء الإذن للمتصفح.");
        }
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        light.classList.remove('recording');
    };

    // 2. معالجة الصوت (الصدى والتحسين)
    async function processAudio(isEnhance = false) {
        if (!audioPlayback.src) return;

        // تهيئة الـ Audio Context
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const response = await fetch(audioPlayback.src);
        const arrayBuffer = await response.arrayBuffer();
        const decodedData = await audioContext.decodeAudioData(arrayBuffer);

        const source = audioContext.createBufferSource();
        source.buffer = decodedData;

        // عقدة الصدى
        const delay = audioContext.createDelay();
        delay.delayTime.value = 0.3;
        const feedback = audioContext.createGain();
        feedback.gain.value = parseFloat(document.getElementById('echoSlider').value);

        // عقدة التحسين (AI Filter) - تقليل الضجيج وتوضيح الطبقة
        const filter = audioContext.createBiquadFilter();
        filter.type = "highshelf";
        filter.frequency.value = 3000;
        filter.gain.value = isEnhance ? 15 : 0;

        const masterGain = audioContext.createGain();

        // التوصيل
        source.connect(filter);
        filter.connect(masterGain);
        
        // مسار الصدى
        filter.connect(delay);
        delay.connect(feedback);
        feedback.connect(delay);
        delay.connect(masterGain);

        masterGain.connect(audioContext.destination);

        source.start();
        statusText.innerText = isEnhance ? "تم تطبيق التحسين والتشغيل" : "جاري التشغيل مع الصدى";
    }

    playBtn.onclick = () => processAudio(false);
    document.getElementById('enhanceBtn').onclick = () => processAudio(true);
    
    document.getElementById('echoSlider').oninput = (e) => {
        document.getElementById('echoVal').innerText = e.target.value;
    };

    document.getElementById('deleteBtn').onclick = () => {
        location.reload();
    };
</script>
</body>
</html>
