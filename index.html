<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مراقبة سَرمد الاحترافي 🛡️</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .monitor-card { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 680px; text-align: center; border: 1px solid #334155; }
        .video-container { position: relative; background: #000; border-radius: 10px; overflow: hidden; border: 3px solid #334155; }
        video { width: 100%; transform: scaleX(-1); }
        .overlay { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.7); padding: 5px 15px; border-radius: 5px; display: none; font-weight: bold; animation: blink 0.8s infinite; }
        .controls { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        button { background: var(--primary); border: none; padding: 10px 25px; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .sensitivity-info { font-size: 0.8rem; color: #94a3b8; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="monitor-card">
    <h2 style="margin-top:0;">نظام الرصد الذكي v2.0</h2>
    <div class="video-container" id="vBox">
        <div class="overlay" id="alertLabel">⚠️ حركة مكتشفة</div>
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div class="controls">
        <button id="startBtn">تفعيل النظام</button>
        <div class="sensitivity-info">
            دقة الرصد: <span id="precision">عالية (تجاهل الاهتزاز)</span>
        </div>
    </div>
</div>

<canvas id="currCanvas" style="display:none;"></canvas>
<canvas id="prevCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const currCanvas = document.getElementById('currCanvas');
    const prevCanvas = document.getElementById('prevCanvas');
    const alertLabel = document.getElementById('alertLabel');
    const vBox = document.getElementById('vBox');

    let isRunning = false;
    let lastFrame = null;

    document.getElementById('startBtn').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').innerText = "النظام يعمل...";
        requestAnimationFrame(processFrame);
    };

    function processFrame() {
        if (!isRunning) return;

        const width = 160; // تقليل الأبعاد لمعالجة أسرع وأدق
        const height = 120;
        currCanvas.width = width;
        currCanvas.height = height;

        const ctx = currCanvas.getContext('2d', {willReadFrequently: true});
        ctx.drawImage(video, 0, 0, width, height);
        
        // 1. تحويل الصورة لرمادي وتقليل الضجيج (Grayscale & Blur effect)
        const imgData = ctx.getImageData(0, 0, width, height);
        const pixels = imgData.data;
        
        if (lastFrame) {
            let movementScore = 0;
            const threshold = 50; // العتبة اللونية لتجاهل اهتزاز الكاميرا الخفيف

            for (let i = 0; i < pixels.length; i += 4) {
                // حساب السطوع (Luminance)
                const bright = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                const lastBright = (lastFrame[i] + lastFrame[i+1] + lastFrame[i+2]) / 3;
                
                // حساب الفرق المطلق
                const diff = Math.abs(bright - lastBright);
                
                if (diff > threshold) {
                    movementScore++;
                }
            }

            // 2. تصفية النتائج: إذا كان التغيير في أكثر من 3% من الصورة وأقل من 50% (لتجنب اهتزاز الكاميرا الكلي)
            const motionPercentage = (movementScore / (width * height)) * 100;
            
            if (motionPercentage > 2.5 && motionPercentage < 40) {
                triggerAlert();
            } else {
                stopAlert();
            }
        }

        lastFrame = new Uint8ClampedArray(pixels);
        requestAnimationFrame(processFrame);
    }

    function triggerAlert() {
        alertLabel.style.display = "block";
        vBox.style.borderColor = "#ff4757";
        playSystemSound(800);
    }

    function stopAlert() {
        alertLabel.style.display = "none";
        vBox.style.borderColor = "#334155";
    }

    // صوت إنذار ترددي
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSystemSound(freq) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.01);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }
</script>
</body>
</html>
