<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مراقبة سَرمد المطور v3.0</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #334155; width: 640px; }
        .v-container { position: relative; border-radius: 10px; overflow: hidden; border: 4px solid #334155; line-height: 0; }
        video { width: 100%; filter: contrast(1.2); }
        .status-bar { margin-top: 15px; padding: 10px; border-radius: 8px; background: #334155; font-weight: bold; }
        .alarm-on { background: #ef4444; animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: translateX(0)} 25% {transform: translateX(5px)} 75% {transform: translateX(-5px)} 100% {transform: translateX(0)} }
        .slider-container { margin: 15px 0; font-size: 0.9rem; color: #94a3b8; }
        button { background: #0ea5e9; border: none; padding: 12px 25px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>الرصد الذكي (مضاد للإنذار الكاذب) 🛡️</h2>
    <div class="v-container" id="vBox">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div class="slider-container">
        حساسية الرصد (كلما زاد الرقم قل الإنذار الكاذب): 
        <input type="range" id="sensRange" min="10" max="100" value="40">
        <span id="sensVal">40</span>
    </div>

    <button id="startBtn">بدء المراقبة</button>
    <div class="status-bar" id="status">النظام: جاهز</div>
</div>

<canvas id="procCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const sensRange = document.getElementById('sensRange');
    const sensVal = document.getElementById('sensVal');
    const canvas = document.getElementById('procCanvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    let prevData = null;
    let alarmCounter = 0; // لضمان أن الحركة حقيقية وليست ومضة
    let isActive = false;

    sensRange.oninput = () => sensVal.innerText = sensRange.value;

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            isActive = true;
            status.innerText = "النظام: جاري المعايرة...";
            setTimeout(() => { status.innerText = "النظام: مراقبة نشطة ✅"; }, 2000);
            process();
        } catch(e) { alert("فشل الوصول للكاميرا"); }
    };

    function process() {
        if (!isActive) return;

        // تصغير الصورة جداً لقتل "الضجيج" النمشي (Noise)
        canvas.width = 80; 
        canvas.height = 60;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        if (prevData) {
            let change = 0;
            const threshold = parseInt(sensRange.value);

            for (let i = 0; i < currentData.length; i += 4) {
                // مقارنة السطوع فقط
                const currAvg = (currentData[i] + currentData[i+1] + currentData[i+2]) / 3;
                const prevAvg = (prevData[i] + prevData[i+1] + prevData[i+2]) / 3;
                
                if (Math.abs(currAvg - prevAvg) > threshold) {
                    change++;
                }
            }

            // يجب أن تتغير 5% من الصورة على الأقل ليتم اعتبارها حركة
            if (change > (canvas.width * canvas.height * 0.05)) {
                alarmCounter++;
            } else {
                alarmCounter = Math.max(0, alarmCounter - 1);
            }

            // الإنذار لا يفتح إلا إذا استمرت الحركة لـ 5 إطارات متتالية (نصف ثانية تقريباً)
            if (alarmCounter > 5) {
                status.innerText = "⚠️ تم رصد حركة حقيقية!";
                status.classList.add('alarm-on');
                playSimpleTone();
            } else {
                status.innerText = "النظام: مراقبة نشطة ✅";
                status.classList.remove('alarm-on');
            }
        }

        prevData = currentData;
        // تقليل سرعة المعالجة لـ 15 إطار في الثانية لزيادة الدقة وتقليل العبء
        setTimeout(() => requestAnimationFrame(process), 66); 
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSimpleTone() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g);
        g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.frequency.value = 600;
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }
</script>
</body>
</html>
