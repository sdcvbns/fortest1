<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مبيعات طالب Pro - الإدارة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --primary: #b8860b; /* ذهبي عميق وبارز */
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-focus: #b8860b;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* حماية ومنع النسخ */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-body);
            margin: 0; padding: 15px;
            color: var(--text-dark);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 800px;
            background: var(--card-bg);
            border-radius: 24px; padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid #fff;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header {
            text-align: center; border-bottom: 3px solid var(--primary);
            padding-bottom: 20px; margin-bottom: 30px; position: relative;
        }

        #shopTitle {
            font-size: 2rem; font-weight: 800; color: var(--primary);
            margin: 0; text-shadow: 1px 1px 0px rgba(0,0,0,0.05);
        }

        .section-box {
            background: #fdfdfd; padding: 20px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid var(--border-color);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .section-title {
            font-weight: 700; color: var(--primary);
            margin-bottom: 15px; display: flex; align-items: center; gap: 10px;
        }

        input, select, textarea {
            width: 100%; padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 14px; font-size: 16px; font-family: 'Cairo';
            background: #fff; color: var(--text-dark);
            transition: all 0.2s; outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(184, 134, 11, 0.1);
            background: #fff;
        }

        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 10px; }
        .col { flex: 1; min-width: 250px; }

        .btn-main {
            background: var(--primary); color: white; width: 100%;
            padding: 18px; border: none; border-radius: 16px;
            font-weight: 800; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(184, 134, 11, 0.4);
            transition: 0.3s; margin-top: 10px;
        }
        .btn-main:active { transform: scale(0.98); }

        .btn-search {
            background: #fff; color: var(--primary);
            border: 2px solid var(--primary); padding: 10px 20px;
            border-radius: 12px; cursor: pointer; font-weight: 700;
        }

        .result-card {
            background: #fff; border: 2px solid var(--border-color);
            padding: 15px; border-radius: 15px; margin-top: 10px;
            border-right: 6px solid var(--primary); cursor: pointer;
            transition: 0.2s; text-align: right;
        }
        .result-card:hover { border-color: var(--primary); transform: translateX(-5px); }

        #setupOverlay {
            position: fixed; inset: 0; background: #fff;
            z-index: 9999; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }

        @media print { .no-print { display: none !important; } }
        @media (max-width: 500px) { .col { min-width: 100%; } .container { padding: 15px; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="setupOverlay">
    <div style="width:90%; max-width:400px; text-align:center;">
        <h2 style="color:var(--primary);">مرحباً بك</h2>
        <input type="text" id="shopInput" style="text-align: center;" placeholder="أدخل اسم المحل">
        <button class="btn-main" onclick="saveShopName()">دخول</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div id="shopTitle"></div>
        <button class="no-print" onclick="editShopName()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px; margin-top:5px;">تعديل الاسم</button>
    </div>

    <div class="section-box no-print">
        <div class="section-title">البحث عن تصليح سابق</div>
        <div class="row" style="align-items: center;">
            <div style="flex: 1;"><input type="text" id="searchName" placeholder="ابحث باسم الزبون هنا..." style="margin-bottom:0"></div>
            <button class="btn-search" onclick="searchCustomer()">ابحث</button>
        </div>
        <div id="searchResults"></div>
    </div>

    <div class="section-box">
        <div class="section-title">بيانات الزبون والجهاز</div>
        <div class="row">
            <div class="col"><input type="text" id="custName" placeholder="اسم الزبون الكامل"></div>
            <div class="col"><input type="tel" id="custPhone" placeholder="رقم الهاتف"></div>
        </div>
        <div class="row">
            <div class="col">
                <select id="brand">
                    <option value="" disabled selected>اختر الشركة</option>
                    <option>سامسونج</option><option>هونر</option><option>هواوي</option>
                    <option>تكنو</option><option>انفنكس</option><option>ريلمي</option>
                    <option>بوكو</option><option>ايتل</option><option>موتريلا</option>
                    <option>أخرى</option>
                </select>
            </div>
            <div class="col"><input type="text" id="phoneModel" placeholder="موديل الجهاز"></div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">تفاصيل الصيانة والحساب</div>
        <div class="row">
            <div class="col">
                <select id="issueType">
                    <option value="" disabled selected>نوع العطل</option>
                    <option>شاشة</option><option>قاعدة</option><option>بطارية</option>
                    <option>سماعة</option><option>فلاتة شحن</option><option>ظهر</option>
                    <option>معالج</option><option>هيكل</option><option>ازرار</option>
                </select>
            </div>
            <div class="col">
                <select id="paymentStatus">
                    <option> واصل</option><option> غير واصل</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col"><input type="number" id="price" placeholder="المبلغ الكلي" oninput="autoDivide()"></div>
            <div class="col"><input type="number" id="halfPrice" placeholder="النصف (تلقائي)" readonly style="background:#fff9e6; color:var(--primary); font-weight:bold;"></div>
        </div>
    </div>

    <textarea id="notes" rows="2" placeholder="ملاحظات إضافية..." style="margin-bottom:15px;"></textarea>

    <button class="btn-main no-print" onclick="submitData()" id="mainBtn"> حفظ البيانات وطباعة الوصل</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2brhi3QsVUMdcHiL2uI2PBqFNVchi0JDum8LIH3holq2SOFIoogxB8cmONCXgg9o4/exec";

    window.onload = () => {
        const n = localStorage.getItem('sarmad_ultra_v6');
        if (!n) document.getElementById('setupOverlay').style.display = 'flex';
        else document.getElementById('shopTitle').innerText = n;
    };

    function saveShopName() {
        const v = document.getElementById('shopInput').value;
        if(v) { localStorage.setItem('sarmad_ultra_v6', v); location.reload(); }
    }

    function editShopName() {
        const n = prompt("الاسم الجديد:", localStorage.getItem('sarmad_ultra_v6'));
        if(n) { localStorage.setItem('sarmad_ultra_v6', n); document.getElementById('shopTitle').innerText = n; }
    }

    function autoDivide() {
        const p = document.getElementById('price').value;
        document.getElementById('halfPrice').value = p ? Math.round(p / 2) : '';
    }

    async function submitData() {
        const btn = document.getElementById('mainBtn');
        const data = {
            shopName: document.getElementById('shopTitle').innerText,
            customerName: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            phoneModel: document.getElementById('phoneModel').value,
            brand: document.getElementById('brand').value,
            issueType: document.getElementById('issueType').value,
            paymentStatus: document.getElementById('paymentStatus').value,
            price: document.getElementById('price').value,
            notes: document.getElementById('notes').value
        };

        if(!data.customerName || !data.price) return alert(" أكمل البيانات!");
        btn.disabled = true; btn.innerText = "جارٍ الحفظ...";

        try {
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            window.print();
            alert(" تم الحفظ!");
            clearFields();
        } catch(e) { alert("خطأ!"); }
        finally { btn.disabled = false; btn.innerText = "🚀 حفظ البيانات وطباعة الوصل"; }
    }

    async function searchCustomer() {
        const n = document.getElementById('searchName').value;
        const resDiv = document.getElementById('searchResults');
        if(!n) return;
        resDiv.innerHTML = "<p style='color:var(--primary)'>جاري استعادة البيانات... 📡</p>";
        try {
            const response = await fetch(SCRIPT_URL + "?name=" + encodeURIComponent(n));
            const data = await response.json();
            resDiv.innerHTML = data.map(i => `
                <div class="result-card" onclick="fillInputs(${JSON.stringify(i).replace(/"/g, '&quot;')})">
                    <b>📅 ${i.date}</b> | ${i.phoneModel} (${i.brand})<br>
                    عطل: ${i.issue} | سعر: ${i.price} | ${i.payment}
                </div>
            `).join('') || "لا يوجد سجلات.";
        } catch(e) { resDiv.innerHTML = "خطأ في الاتصال!"; }
    }

    function fillInputs(i) {
        document.getElementById('custName').value = i.customer;
        document.getElementById('brand').value = i.brand || 'أخرى';
        document.getElementById('phoneModel').value = i.phoneModel;
        document.getElementById('issueType').value = i.issue;
        document.getElementById('price').value = i.price;
        autoDivide();
    }

    function clearFields() {
        ['custName', 'custPhone', 'phoneModel', 'brand', 'issueType', 'price', 'halfPrice', 'notes', 'searchName'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = '';
        });
        document.getElementById('searchResults').innerHTML = '';
    }

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && ['c', 'u', 's', 'a'].includes(e.key)) e.preventDefault();
    });
</script>
</body>
</html>
