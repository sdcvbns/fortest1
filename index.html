<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مبيعات طالب Pro - الإصدار المستقر</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #b8860b;
            --primary-light: #d4af37;
            --secondary: #1e293b;
            --bg-body: #f4f7f9;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg-body);
            margin: 0; padding: 10px;
            color: var(--text-dark);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 850px;
            background: var(--card-bg);
            border-radius: 25px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #fff;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; border-bottom: 4px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        #shopTitle { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin: 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 15px; border: none; border-radius: 12px;
            font-family: 'Noto Kufi Arabic'; font-weight: 700;
            cursor: pointer; background: #e2e8f0; color: var(--secondary);
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-box {
            background: #fdfdfd; padding: 20px; border-radius: 15px;
            border: 1px solid var(--border); margin-bottom: 15px;
        }

        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 15px; }

        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 10px; }
        .col { flex: 1; min-width: 250px; }

        input, select, textarea {
            width: 100%; padding: 14px; border: 2px solid var(--border);
            border-radius: 12px; font-size: 16px; font-family: 'Noto Kufi Arabic';
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--primary); color: white; font-weight: 800;
            font-size: 18px; cursor: pointer; margin-top: 10px;
        }

        /* تنسيق قائمة السجل */
        #scrollContainer {
            max-height: 550px; overflow-y: auto;
            padding: 5px; border-radius: 10px;
        }

        .result-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border-right: 6px solid var(--primary);
            text-align: right; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .result-header { font-weight: 800; color: var(--primary); border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }

        .result-actions { display: flex; gap: 10px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #eee; }
        .btn-edit { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        @media print { .no-print { display: none !important; } }
        @media (max-width: 600px) { .col { min-width: 100%; } .tabs { flex-direction: column; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="header">
        <div id="shopTitle"></div>
        <button class="no-print" onclick="editShopName()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:12px; font-weight:bold;">تعديل الاسم</button>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" id="tab1" onclick="showTab('entry')">تسجيل صيانة جديد</button>
        <button class="tab-btn" id="tab2" onclick="openArchive()">سجل الزبائن والأرشيف</button>
    </div>

    <div id="entry" class="tab-content active">
        <input type="hidden" id="editRowIdx">
        <div class="section-box">
            <div class="section-title">بيانات الزبون والجهاز</div>
            <div class="row">
                <div class="col"><input type="text" id="custName" placeholder="اسم الزبون الكامل"></div>
                <div class="col"><input type="tel" id="custPhone" placeholder="رقم الهاتف"></div>
            </div>
            <div class="row">
                <div class="col">
                    <select id="brand">
                        <option value="" disabled selected>الشركة المصنعة</option>
                        <option>سامسونج</option><option>هونر</option><option>هواوي</option><option>تكنو</option><option>انفنكس</option><option>ريلمي</option><option>بوكو</option><option>ايتل</option><option>موتريلا</option><option>أخرى</option>
                    </select>
                </div>
                <div class="col"><input type="text" id="phoneModel" placeholder="موديل الجهاز"></div>
            </div>
        </div>
        <div class="section-box">
            <div class="section-title">الحسابات</div>
            <div class="row">
                <div class="col">
                    <select id="issueType">
                        <option value="" disabled selected>نوع العطل</option>
                        <option>شاشة</option><option>قاعدة</option><option>بطارية</option><option>سماعة</option><option>فلاتة شحن</option><option>ظهر</option><option>معالج</option><option>هيكل</option><option>ازرار</option>
                    </select>
                </div>
                <div class="col">
                    <select id="paymentStatus">
                        <option>واصل</option><option>غير واصل</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col"><input type="number" id="price" placeholder="المبلغ الكلي" oninput="autoDivide()"></div>
                <div class="col"><input type="number" id="halfPrice" placeholder="النصف" readonly style="background:#fffbe6;"></div>
            </div>
        </div>
        <textarea id="notes" rows="2" placeholder="ملاحظات..." style="margin-bottom:15px;"></textarea>
        <button class="btn-main no-print" onclick="submitData()" id="mainBtn">حفظ وطباعة</button>
    </div>

    <div id="archive" class="tab-content">
        <div class="section-box">
            <div class="section-title">بحث ذكي (فلترة فورية)</div>
            <input type="text" id="smartSearch" placeholder="ابحث باسم الزبون أو موديل الهاتف..." oninput="filterArchive()">
        </div>
        <div id="scrollContainer">
            <div id="searchResults"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkT9a6AVg4OgY2J-5unrDonuQS9MCtzb-baTARlYlnhCFKA0Fx9RvFcfCGSOg53NXp/exec";
    let allData = [];
    const ADMIN_PASS = "tsm"; // رمز الدخول المطلوب للتعديل والحذف

    window.onload = () => {
        const n = localStorage.getItem('sarmad_pro_v6');
        if (n) document.getElementById('shopTitle').innerText = n;
    };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'entry') document.getElementById('tab1').classList.add('active');
        else document.getElementById('tab2').classList.add('active');
    }

    async function openArchive() {
        showTab('archive');
        const resDiv = document.getElementById('searchResults');
        resDiv.innerHTML = "<p style='text-align:center; color:var(--primary);'>جاري تحميل السجلات السابقة... 📡</p>";
        
        try {
            const r = await fetch(SCRIPT_URL + "?name=");
            allData = await r.json();
            displayResults(allData);
        } catch(e) {
            resDiv.innerHTML = "<p style='text-align:center; color:red;'>فشل في الاتصال بالقاعدة.</p>";
        }
    }

    function displayResults(data) {
        const resDiv = document.getElementById('searchResults');
        if (!data || data.length === 0) {
            resDiv.innerHTML = "<p style='text-align:center;'>لا توجد بيانات متاحة.</p>";
            return;
        }
        resDiv.innerHTML = data.map(i => `
            <div class="result-card">
                <div class="result-header">زبون: ${i.customer}</div>
                <b>التاريخ:</b> ${i.date}<br>
                <b>الجهاز:</b> ${i.phoneModel} (${i.brand})<br>
                <b>العطل:</b> ${i.issue} | <b>السعر:</b> ${i.price} | <b>${i.payment}</b>
                <div class="result-actions no-print">
                    <button class="btn-edit" onclick='fillForEdit(${JSON.stringify(i).replace(/'/g, "&apos;")})'>تعديل</button>
                    <button class="btn-delete" onclick="deleteItem(${i.rowIdx})">حذف</button>
                </div>
            </div>
        `).join('');
    }

    function filterArchive() {
        const query = document.getElementById('smartSearch').value.toLowerCase();
        const filtered = allData.filter(i => 
            i.customer.toLowerCase().includes(query) || 
            i.phoneModel.toLowerCase().includes(query)
        );
        displayResults(filtered);
    }

    function autoDivide() {
        const p = document.getElementById('price').value;
        document.getElementById('halfPrice').value = p ? Math.round(p / 2) : '';
    }

    async function submitData() {
        const btn = document.getElementById('mainBtn');
        const rowIdx = document.getElementById('editRowIdx').value;
        const data = {
            action: rowIdx ? "UPDATE" : "ADD",
            rowIdx: rowIdx,
            shopName: document.getElementById('shopTitle').innerText,
            customerName: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            phoneModel: document.getElementById('phoneModel').value,
            brand: document.getElementById('brand').value,
            issueType: document.getElementById('issueType').value,
            paymentStatus: document.getElementById('paymentStatus').value,
            price: document.getElementById('price').value,
            notes: document.getElementById('notes').value
        };

        if(!data.customerName || !data.price) return alert("أكمل البيانات!");
        btn.disabled = true; btn.innerText = "جاري الحفظ...";
        
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("تم الحفظ بنجاح!");
            if(!rowIdx) window.print();
            location.reload();
        } catch(e) { alert("خطأ!"); btn.disabled = false; }
    }

    function fillForEdit(i) {
        const pass = prompt("يرجى إدخال رمز الدخول للتعديل:");
        if (pass !== ADMIN_PASS) {
            alert("رمز الدخول غير صحيح!");
            return;
        }
        showTab('entry');
        document.getElementById('editRowIdx').value = i.rowIdx;
        document.getElementById('custName').value = i.customer;
        document.getElementById('custPhone').value = i.phone || '';
        document.getElementById('brand').value = i.brand || '';
        document.getElementById('phoneModel').value = i.phoneModel;
        document.getElementById('issueType').value = i.issue;
        document.getElementById('price').value = i.price;
        autoDivide();
        document.getElementById('mainBtn').innerText = "تحديث السجل الحالي";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteItem(idx) {
        const pass = prompt("يرجى إدخال رمز الدخول للحذف:");
        if (pass !== ADMIN_PASS) {
            alert("رمز الدخول غير صحيح!");
            return;
        }
        if(!confirm("حذف السجل نهائياً؟")) return;
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "DELETE", rowIdx: idx}) });
            alert("تم الحذف!");
            openArchive();
        } catch(e) { alert("خطأ!"); }
    }

    function editShopName() {
        const n = prompt("اسم المحل الجديد:", localStorage.getItem('sarmad_pro_v6'));
        if(n) { localStorage.setItem('sarmad_pro_v6', n); document.getElementById('shopTitle').innerText = n; }
    }

    document.addEventListener('keydown', e => { if (e.ctrlKey && ['c', 'u', 's', 'a'].includes(e.key)) e.preventDefault(); });
</script>
</body>
</html>
